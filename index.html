<script src="script.js"></script>

<script>
function startDownload(element, downloadUrl) {
    // Agar download chal rha hai toh dubara click block karein
    if(element.classList.contains('downloading')) return;
    
    element.classList.add('downloading');
    
    const progressFill = element.querySelector('.progress-fill');
    const btnText = element.querySelector('.btn-text');
    
    let progress = 0;
    element.style.background = "#222"; 
    element.style.color = "#fff";
    
    const interval = setInterval(() => {
        // Real feel dene ke liye random steps me progress badhegi
        progress += Math.floor(Math.random() * 6) + 3; 
        if (progress > 100) progress = 100;
        
        if(progressFill) progressFill.style.width = progress + "%";
        if(btnText) btnText.innerText = progress + "%";
        
        if (progress === 100) {
            clearInterval(interval);
            
            // 100% hote hi action complete
            setTimeout(() => {
                // Button reset karein
                if(progressFill) progressFill.style.width = "0%";
                if(btnText) btnText.innerText = "DOWNLOAD";
                element.style.background = "#00ff00";
                element.style.color = "black";
                element.classList.remove('downloading');
                
                // Bina kisi popup ke direct link trigger hogi yahan
                window.location.href = downloadUrl;
            }, 300);
        }
    }, 100); // Progress running speed handler
}
</script>
